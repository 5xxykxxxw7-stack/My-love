<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى أميرتي ❤️</title>
    <style>
        body { 
            background: linear-gradient(135deg, #8b0000 0%, #4a0000 100%); 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            overflow: hidden;
        }
        .card { 
            width: 90%; 
            max-width: 400px; 
            background: rgba(255, 255, 255, 0.15); 
            padding: 40px 20px; 
            border-radius: 30px; 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .page { display: none; animation: fadeIn 1s ease-in-out; }
        .active { display: block; }
        
        input { 
            width: 80%; 
            padding: 15px; 
            border-radius: 50px; 
            border: none; 
            margin: 25px 0; 
            text-align: center; 
            font-size: 18px; 
            outline: none;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }
        
        button { 
            background: #ff4d4d; 
            color: white; 
            border: none; 
            padding: 15px 45px; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 18px;
            transition: transform 0.3s, background 0.3s;
        }
        button:hover { background: #ff1a1a; transform: scale(1.05); }
        
        .timer-box { 
            font-size: 20px; 
            margin: 20px 0; 
            color: #ffeb3b; 
            background: rgba(0,0,0,0.3); 
            padding: 20px; 
            border-radius: 20px;
            line-height: 1.6;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .heart-beat { animation: beat 1.5s infinite; display: inline-block; }
        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
    </style>
</head>
<body>
    <div class="card">
        <div id="page1" class="page active">
            <h2 class="heart-beat">جاهزة؟ 😍</h2>
            <input type="password" id="passInput" placeholder="ادخلي تاريخ يومنا المميز...">
            <br>
            <button onclick="checkPass()">فتح ❤️</button>
        </div>

        <div id="page2" class="page">
            <p style="font-size: 19px; line-height: 1.5;">
                بحبك بكل حاجة في حياتي، وحقك عليا لو ضايقتك في يوم.. تعالي نفتكر كل حاجة بينا هنا ونبدأ بداية جديدة.. بحبك <span class="heart-beat">❤️</span>
            </p>
            <div class="timer-box">
                <small>بقالنا سوا:</small><br>
                <span id="t1" style="font-weight: bold;"></span>
            </div>
            <div class="timer-box" style="border: 1px solid #52ff52; color: #52ff52;">
                <small style="color: white;">فاضل على الفرح وعمرنا الجديد:</small><br>
                <span id="t2" style="font-weight: bold;"></span>
            </div>
        </div>
    </div>

    <script>
        function checkPass() {
            // كلمة السر: 1162025
            if(document.getElementById('passInput').value === "1162025") {
                document.getElementById('page1').style.display = 'none';
                document.getElementById('page2').style.display = 'block';
                update(); // تشغيل فوري
                setInterval(update, 1000);
            } else { 
                alert("غلط يا روحي! حاولي تاني ❤️"); 
            }
        }

        function update() {
            const now = new Date();
            const startDate = new Date(2025, 3, 3); // 3 أبريل 2025
            const weddingDate = new Date(2026, 7, 15); // 15 أغسطس 2026

            // حساب الوقت المنقضي
            const diffPast = now - startDate;
            const daysPast = Math.floor(diffPast / (1000 * 60 * 60 * 24));
            document.getElementById('t1').innerText = daysPast + " يوم من الحب ❤️";

            // حساب الوقت المتبقي
            const diffFuture = weddingDate - now;
            if (diffFuture > 0) {
                const d = Math.floor(diffFuture / (1000 * 60 * 60 * 24));
                const h = Math.floor((diffFuture % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((diffFuture % (1000 * 60 * 60)) / (1000 * 60));
                document.getElementById('t2').innerText = `${d} يوم، ${h} ساعة، و ${m} دقيقة`;
            } else {
                document.getElementById('t2').innerText = "لقد بدأ فرحنا بالفعل! ❤️✨";
            }
        }
    </script>
</body>
</html>
